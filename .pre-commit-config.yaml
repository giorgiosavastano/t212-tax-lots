repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format .
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        types_or: [python, pyi]
